name: photodrop

# Portable base stack. Runs standalone as-is.
#
# For a reverse-proxy / production deployment, drop the concrete infra (external
# network, host data path, ...) into a compose.override.yaml — Compose auto-merges
# it on top of this file. See docs/INSTALL.md and compose.override.example.yaml.

services:
  photodrop:
    build:
      context: .
      args:
        NODE_VERSION: "22"
    image: homelab/photodrop:1.3.0
    container_name: apps-photodrop
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-UTC}
      - PORT=3000
      - DATA_DIR=/data           # container path; app writes DB + albums here
    volumes:
      # Host path for persistent data. Defaults to ./data (created next to this
      # file). Set DATA_DIR in the environment to relocate it, or override the
      # whole mapping in compose.override.yaml.
      - ${DATA_DIR:-./data}:/data
    # Standalone (no reverse proxy): uncomment to reach the app on localhost.
    # ports:
    #   - "3000:3000"
    read_only: true              # rootfs read-only; only /data (volume) + /tmp (tmpfs) writable
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL                      # binds :3000 (>1024), needs no capabilities
    mem_limit: 1500m
    memswap_limit: 1500m
    cpus: "1.5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
